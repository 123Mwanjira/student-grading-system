<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Grade Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Student Grade Dashboard</h1>

  <div class="form">
    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="marks" placeholder="Marks (0-100)">
    <button onclick="addOrUpdateStudent()">Save</button>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search..." onkeyup="renderTable()">
    <select id="sort" onchange="renderTable()">
      <option value="">Sort By</option>
      <option value="marks">Marks</option>
      <option value="name">Name</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Marks</th>
        <th>Grade</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div>

<script src="script.js"></script>
</body>
</html>
